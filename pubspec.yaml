name: yamtaz
description: "A new Flutter project."
publish_to: 'none'

version: 2.0.1+506

environment:
  sdk: '>=3.3.4 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  equatable: ^2.0.5

  # Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Networking
  dio: ^5.7.0
  retrofit: ^4.4.1
  pretty_dio_logger: ^1.4.0

  # Serialization
  json_annotation: ^4.9.0
  freezed_annotation: ^2.4.4

  # State Management
  flutter_bloc: ^9.1.1
  bloc: ^9.2.0
  get_it: ^9.2.0

  # UI
  flutter_screenutil: ^5.9.3
  flutter_svg: ^2.0.10+1
  shimmer: ^3.0.0
  photo_view: ^0.15.0
  smooth_page_indicator: ^2.0.1
  font_awesome_flutter: ^11.0.0
  heroicons: ^0.11.0
  flutter_animate: ^4.5.0
  page_transition: ^2.1.0
  lottie: ^3.1.2
  skeletonizer: ^2.1.2
  animated_custom_dropdown: ^3.1.1
  flutter_rating_bar: ^4.0.1
  flutter_local_notifications: ^17.1.2
  timezone: ^0.9.4
  stop_watch_timer: ^3.1.1

  # Inputs
  pinput: ^6.0.1
  flutter_timer_countdown: ^1.0.7
  intl_phone_number_input: ^0.7.4
  intl_phone_field: ^3.2.0

  # Localization
  easy_localization: ^3.0.7
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2

  # Media
  image_picker: ^1.1.2
  audioplayers: ^6.5.1
  flutter_sound: ^9.2.13
  audio_waveforms: ^1.0.4

  # Maps
  google_maps_flutter: ^2.9.0
  geolocator: ^14.0.2
  geocoding: ^4.0.0
  location: ^8.0.1
  map_location_picker: ^2.0.3

  # Device
  permission_handler: ^12.0.1
  device_info_plus: ^12.1.0
  package_info_plus: ^9.0.1

  # Files
  path: ^1.9.0
  path_provider: ^2.1.4
  file_picker: ^11.0.2

  # Web
  flutter_inappwebview: ^6.1.3

  # Firebase
  firebase_core: ^4.4.0
  firebase_auth: ^6.1.4
  firebase_messaging: ^16.1.1
  firebase_crashlytics: ^5.0.7
  firebase_analytics: ^12.1.1

  # Auth
  google_sign_in: ^7.2.0
  sign_in_with_apple: ^7.0.1

  # Payments
  moyasar: ^3.0.0

  # Calls
  agora_rtc_engine: ^6.5.3
  

  # Utils
  shared_preferences: ^2.3.2
  fluttertoast: ^9.0.0
  url_launcher: ^6.1.14
  android_intent_plus: ^6.0.0
  timeago: ^3.7.0
  upgrader: ^13.0.0
  qr_flutter: ^4.1.0
  animated_snack_bar: ^0.4.0
  delightful_toast: ^1.1.0
  readmore: ^3.0.0

  # Charts & PDF
  fl_chart: ^1.1.1
  pdf: ^3.11.1
  flutter_pdfview: ^1.3.3
  syncfusion_flutter_core: ^33.1.49
  syncfusion_flutter_pdfviewer: ^33.1.49
  syncfusion_flutter_gauges: ^33.1.49
  syncfusion_flutter_datepicker: ^33.1.49

  # Misc
  flutter_expandable_fab: ^2.3.0
  card_swiper: ^3.0.1
  modal_bottom_sheet: ^3.0.0
  flutter_widget_from_html: ^0.17.1
  cupertino_stepper: ^0.2.1

  # AI
  google_generative_ai: ^0.4.6

  # Code push
  shorebird_code_push: ^2.0.5
  conditional_builder_null_safety: ^0.0.6
  in_app_review: ^2.0.11
  share_plus: ^12.0.2
  cross_file: ^0.3.5+2
  place_picker_google: ^0.0.20

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.1

  # Codegen (Stable)
  build_runner: ^2.4.13
  retrofit_generator: ^8.1.0
  json_serializable: ^6.8.0
  freezed: ^2.5.2
  hive_generator: ^2.0.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/android/play_store_512.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true

  assets:
    - assets/svgs/
    - assets/translations/
    - assets/ios/
    - assets/android/
    - shorebird.yaml

  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo/Cairo-ExtraLight.ttf
          weight: 100
        - asset: assets/fonts/Cairo/Cairo-Light.ttf
          weight: 200
        - asset: assets/fonts/Cairo/Cairo-Regular.ttf
          weight: 300
        - asset: assets/fonts/Cairo/Cairo-Medium.ttf
          weight: 400
        - asset: assets/fonts/Cairo/Cairo-SemiBold.ttf
          weight: 500
        - asset: assets/fonts/Cairo/Cairo-Bold.ttf
          weight: 600
        - asset: assets/fonts/Cairo/Cairo-ExtraBold.ttf
          weight: 700
